<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Ticket card outline -->
  <rect x="14" y="14" width="100" height="86" rx="10" stroke="white" stroke-width="5"/>

  <!-- Left accent bar -->
  <rect x="14" y="14" width="9" height="86" rx="4" fill="white"/>

  <!-- Title line -->
  <rect x="33" y="26" width="64" height="7" rx="3.5" fill="white" fill-opacity="0.95"/>

  <!-- Divider -->
  <rect x="33" y="42" width="78" height="1.5" fill="white" fill-opacity="0.4"/>

  <!-- Content lines -->
  <rect x="33" y="50" width="48" height="5" rx="2.5" fill="white" fill-opacity="0.6"/>
  <rect x="33" y="62" width="56" height="5" rx="2.5" fill="white" fill-opacity="0.6"/>
  <rect x="33" y="74" width="40" height="5" rx="2.5" fill="white" fill-opacity="0.6"/>

  <!-- Status badge -->
  <rect x="33" y="86" width="38" height="11" rx="5.5" fill="white" fill-opacity="0.8"/>

  <!-- AI badge -->
  <rect x="82" y="68" width="34" height="34" rx="10" fill="white" fill-opacity="0.2" stroke="white" stroke-width="2"/>
  <text x="99" y="91" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="white" letter-spacing="-0.5">AI</text>
</svg>
