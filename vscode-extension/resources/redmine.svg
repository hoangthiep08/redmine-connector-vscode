<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="aibadge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9a825"/>
      <stop offset="100%" stop-color="#f57f17"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect width="128" height="64" rx="28" fill="white" fill-opacity="0.06"/>


  <!-- Ticket card -->
  <rect x="14" y="14" width="100" height="86" rx="10" fill="url(#card)" stroke="white" stroke-opacity="0.2" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Red left accent bar -->
  <rect x="14" y="14" width="9" height="86" rx="6" fill="#e53935"/>
  <rect x="19" y="14" width="4" height="86" fill="#e53935"/>

  <!-- Title line -->
  <rect x="33" y="26" width="64" height="7" rx="3.5" fill="white" fill-opacity="0.95"/>

  <!-- Divider -->
  <rect x="33" y="42" width="78" height="1" fill="white" fill-opacity="0.15"/>

  <!-- Content lines -->
  <rect x="33" y="50" width="48" height="5" rx="2.5" fill="white" fill-opacity="0.55"/>
  <rect x="33" y="62" width="56" height="5" rx="2.5" fill="white" fill-opacity="0.55"/>
  <rect x="33" y="74" width="40" height="5" rx="2.5" fill="white" fill-opacity="0.55"/>

  <!-- Status badge -->
  <rect x="33" y="86" width="38" height="11" rx="5.5" fill="#43a047" fill-opacity="0.9"/>

  <!-- AI badge — bottom right corner -->
  <rect x="82" y="68" width="34" height="34" rx="10" fill="url(#aibadge)" filter="url(#shadow)"/>
  <text x="99" y="91" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="white" letter-spacing="-0.5">AI</text>
</svg>
